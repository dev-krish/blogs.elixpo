# Auto-release: deploy the site to Cloudflare Pages on every merge to main.
# (Manual / full releases — npm + VS Code + version bump — stay in deploy.sh.)
#
# Required repo secrets:
#   CLOUDFLARE_API_TOKEN   — token with "Cloudflare Pages: Edit" permission
#   CLOUDFLARE_ACCOUNT_ID  — your Cloudflare account id
#   ELIXPO_PAY_API_KEY     — Elixpo Pay secret key (for the post-deploy catalog sync)
name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:   # manual re-deploy of current main

concurrency:
  group: deploy-main
  cancel-in-progress: true   # a newer merge supersedes an in-flight deploy

permissions:
  contents: read

jobs:
  deploy:
    # Skip the deploy.sh bump-commit re-trigger (mirrors deploy.sh's commit msg).
    if: >-
      github.event_name == 'workflow_dispatch' ||
      !contains(github.event.head_commit.message, '[skip deploy]')
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build for Cloudflare Pages
        run: npm run pages:build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
          # NEXT_PUBLIC_* are compiled into the client bundle (inherently public).
          # The committed .env is SOPS-encrypted and .env.local is gitignored, so
          # set them explicitly here — otherwise Next bakes the ENC[…] ciphertext
          # (which broke OAuth: the client_id became the encrypted string).
          NEXT_PUBLIC_URL: "https://blogs.elixpo.com"
          NEXT_PUBLIC_ELIXPO_CLIENT_ID: ${{ vars.NEXT_PUBLIC_ELIXPO_CLIENT_ID || 'cli_aa1d55dfc2c1a1b3cb3a2fc0251ff744af9e41768e4e9d927ebe10a9fbe2578d' }}
          NEXT_PUBLIC_COLLAB_URL: ${{ vars.NEXT_PUBLIC_COLLAB_URL || 'wss://elixpoblogs-collab.ayushbhatt633.workers.dev' }}
          NEXT_PUBLIC_LIXSKETCH_EMBED_URL: ${{ vars.NEXT_PUBLIC_LIXSKETCH_EMBED_URL }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy .vercel/output/static --project-name lixblogs --branch main

  # Push payouts.catalog.json to Elixpo Pay after a successful deploy so the
  # central catalog (prices/tiers) always matches what's shipped. Idempotent —
  # safe to run every deploy. The sync script uses only Node built-ins (no install).
  sync-catalog:
    needs: deploy
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Sync pricing catalog to Elixpo Pay
        env:
          ELIXPO_PAY_API_KEY: ${{ secrets.ELIXPO_PAY_API_KEY }}
        run: |
          if [ -z "$ELIXPO_PAY_API_KEY" ]; then
            echo "::warning::ELIXPO_PAY_API_KEY not set — skipping catalog sync"
            exit 0
          fi
          node scripts/sync-payouts-tiers.mjs

  # Note: D1 migrations are NOT auto-applied here — schema changes stay manual
  # via `npm run db:migrate` to avoid an unexpected prod migration on every push.
